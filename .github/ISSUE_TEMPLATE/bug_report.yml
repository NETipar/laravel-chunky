name: Bug report
description: Report a bug in laravel-chunky
labels: ["bug", "needs-triage"]
body:
  - type: input
    id: chunky-version
    attributes:
      label: laravel-chunky version
      placeholder: "0.14.0"
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: "12.0.0"
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4.0"
    validations:
      required: true
  - type: dropdown
    id: frontend
    attributes:
      label: Frontend integration
      options:
        - None (HTTP only)
        - Vue 3
        - React
        - Alpine.js
        - Livewire
        - Custom (using @netipar/chunky-core directly)
    validations:
      required: true
  - type: dropdown
    id: tracker
    attributes:
      label: Tracker driver
      options:
        - database
        - filesystem
    validations:
      required: true
  - type: dropdown
    id: disk
    attributes:
      label: Storage disk
      options:
        - local
        - s3
        - gcs
        - other (please specify in description)
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: A minimal reproduction. Code snippets or a link to a repo. The smaller the better.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, stack traces, network requests as relevant.
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: |
        Any non-default `config/chunky.php` settings (especially `lock_driver`,
        `tracker`, `disk`, `idempotency`, `metrics`, `broadcasting.*`).
      render: php
