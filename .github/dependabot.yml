version: 2
updates:
  # Composer (PHP)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Budapest"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "composer"
    groups:
      laravel:
        patterns:
          - "illuminate/*"
          - "laravel/*"
      dev-dependencies:
        dependency-type: "development"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

  # pnpm workspace - root devDependencies
  #
  # Build tools (typescript, esbuild) and test tools (vitest, happy-dom)
  # live ONLY in the root devDependencies — they're hoisted by pnpm and
  # available to every workspace package's build script. This means
  # Dependabot only opens ONE PR for typescript bumps (here), not five
  # (one per package + root).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "npm"
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
      esbuild:
        patterns:
          - "esbuild"

  # Per-package configs only watch package-specific deps (the framework
  # peer / type packages — vue, react, @types/react). The build tools
  # were moved to root, so these PRs are sparse.
  - package-ecosystem: "npm"
    directory: "/packages/vue3"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "package:vue3"

  - package-ecosystem: "npm"
    directory: "/packages/react"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "package:react"
