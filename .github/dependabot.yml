version: 2
updates:
  # Composer (PHP)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Budapest"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "composer"
    groups:
      laravel:
        patterns:
          - "illuminate/*"
          - "laravel/*"
      dev-dependencies:
        dependency-type: "development"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

  # pnpm workspace - root devDependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "npm"
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
      esbuild:
        patterns:
          - "esbuild"

  # Per-package npm dependencies — each package's TypeScript / esbuild /
  # @types bumps land in a single grouped PR per package per week (instead
  # of the previous 8 separate PRs across the 4 packages).
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "package:core"
    groups:
      core-dev-dependencies:
        patterns:
          - "typescript"
          - "esbuild"
          - "@types/*"

  - package-ecosystem: "npm"
    directory: "/packages/vue3"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "package:vue3"
    groups:
      vue3-dev-dependencies:
        patterns:
          - "typescript"
          - "esbuild"
          - "@types/*"
          - "vue"

  - package-ecosystem: "npm"
    directory: "/packages/react"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "package:react"
    groups:
      react-dev-dependencies:
        patterns:
          - "typescript"
          - "esbuild"
          - "@types/*"
          - "react"

  - package-ecosystem: "npm"
    directory: "/packages/alpine"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "package:alpine"
    groups:
      alpine-dev-dependencies:
        patterns:
          - "typescript"
          - "esbuild"
          - "@types/*"
