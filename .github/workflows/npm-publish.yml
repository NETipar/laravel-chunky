name: Publish npm packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.17.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # required for npm provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version sync
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          EXPECTED="${TAG#v}"
          for pkg in packages/*/package.json; do
            ACTUAL=$(node -p "require('./${pkg}').version")
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Version mismatch in ${pkg}: expected ${EXPECTED}, got ${ACTUAL}"
              exit 1
            fi
          done
          echo "All package versions match ${EXPECTED}."

      - name: Type-check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm -r run build

      - name: Publish packages with provenance
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
