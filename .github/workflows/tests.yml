name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: PHP code quality (Pint + PHPStan + audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress

      - name: Composer audit
        run: composer audit --format=plain

  js-quality:
    name: Frontend (typecheck + tests + build + audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm -r run build

      - name: pnpm audit (production deps, high+)
        run: pnpm audit --prod --audit-level=high

  lint-yaml:
    name: Lint YAML workflows (actionlint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true

  lint-md:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            README.md
            CHANGELOG.md
            UPGRADE.md
            SECURITY.md
            CONTRIBUTING.md
            docs/**/*.md
        continue-on-error: true

  tests:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        testbench: ['9.*', '10.*', '11.*']
        exclude:
          - laravel: '11.*'
            testbench: '10.*'
          - laravel: '11.*'
            testbench: '11.*'
          - laravel: '12.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '11.*'
          - laravel: '13.*'
            testbench: '9.*'
          - laravel: '13.*'
            testbench: '10.*'
          # Laravel 13 requires PHP 8.3+
          - laravel: '13.*'
            php: '8.2'

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite
          coverage: ${{ matrix.php == '8.4' && matrix.laravel == '12.*' && 'pcov' || 'none' }}

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" "illuminate/routing:${{ matrix.laravel }}" "illuminate/database:${{ matrix.laravel }}" "illuminate/filesystem:${{ matrix.laravel }}" "illuminate/bus:${{ matrix.laravel }}" "illuminate/queue:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        if: matrix.php != '8.4' || matrix.laravel != '12.*'
        run: vendor/bin/pest

      - name: Run tests with coverage
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        run: vendor/bin/pest --coverage --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
