<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#112d4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="chunk1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="chunk2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="chunk3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative chunk blocks (left) -->
  <g transform="translate(100, 200)" opacity="0.08">
    <rect x="0" y="0" width="80" height="50" rx="8" fill="#ffffff"/>
    <rect x="90" y="0" width="80" height="50" rx="8" fill="#ffffff"/>
    <rect x="180" y="0" width="80" height="50" rx="8" fill="#ffffff"/>
    <rect x="0" y="60" width="80" height="50" rx="8" fill="#ffffff"/>
    <rect x="90" y="60" width="80" height="50" rx="8" fill="#ffffff" opacity="0.5"/>
    <rect x="180" y="60" width="80" height="50" rx="8" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Decorative upload arrow (right) -->
  <g transform="translate(980, 190)" opacity="0.06">
    <rect x="30" y="80" width="60" height="100" rx="8" fill="#ffffff"/>
    <polygon points="60,10 110,80 10,80" fill="#ffffff"/>
    <line x1="60" y1="40" x2="60" y2="160" stroke="#0a1628" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <polyline points="40,70 60,40 80,70" fill="none" stroke="#0a1628" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Decorative flowing chunk transfer -->
  <g opacity="0.05" fill="#6366f1">
    <rect x="200" y="440" width="50" height="30" rx="6"/>
    <rect x="280" y="435" width="50" height="30" rx="6"/>
    <rect x="360" y="445" width="50" height="30" rx="6"/>
    <rect x="440" y="430" width="50" height="30" rx="6"/>
    <rect x="520" y="442" width="50" height="30" rx="6"/>
    <rect x="600" y="435" width="50" height="30" rx="6"/>
    <rect x="680" y="445" width="50" height="30" rx="6"/>
    <rect x="760" y="432" width="50" height="30" rx="6"/>
    <rect x="840" y="440" width="50" height="30" rx="6"/>
    <rect x="920" y="438" width="50" height="30" rx="6"/>
    <rect x="1000" y="443" width="50" height="30" rx="6"/>
  </g>

  <!-- Connection lines between chunks -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="2" fill="none" stroke-dasharray="6,4">
    <line x1="250" y1="455" x2="280" y2="450"/>
    <line x1="330" y1="450" x2="360" y2="460"/>
    <line x1="410" y1="460" x2="440" y2="445"/>
    <line x1="490" y1="445" x2="520" y2="457"/>
    <line x1="570" y1="457" x2="600" y2="450"/>
    <line x1="650" y1="450" x2="680" y2="460"/>
    <line x1="730" y1="460" x2="760" y2="447"/>
    <line x1="810" y1="447" x2="840" y2="455"/>
    <line x1="890" y1="455" x2="920" y2="453"/>
    <line x1="970" y1="453" x2="1000" y2="458"/>
  </g>

  <!-- Accent line -->
  <rect x="440" y="200" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Package name -->
  <text x="640" y="270" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">
    Chunky for Laravel
  </text>

  <!-- Tagline -->
  <text x="640" y="330" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#8899aa" letter-spacing="1">
    Chunk-based file uploads with Vue 3, React, Alpine.js &amp; Livewire
  </text>

  <!-- Feature pills -->
  <g transform="translate(640, 385)" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500">
    <!-- Chunked -->
    <rect x="-420" y="-16" width="108" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-366" y="5" fill="#a78bfa">Chunked</text>

    <!-- Resume -->
    <rect x="-292" y="-16" width="100" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-242" y="5" fill="#a78bfa">Resume</text>

    <!-- Events -->
    <rect x="-172" y="-16" width="94" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-125" y="5" fill="#a78bfa">Events</text>

    <!-- SHA-256 -->
    <rect x="-58" y="-16" width="106" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-5" y="5" fill="#a78bfa">SHA-256</text>

    <!-- Queued -->
    <rect x="68" y="-16" width="100" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="118" y="5" fill="#a78bfa">Queued</text>

    <!-- Contexts -->
    <rect x="188" y="-16" width="110" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="243" y="5" fill="#a78bfa">Contexts</text>

    <!-- Multi-FW -->
    <rect x="318" y="-16" width="110" height="32" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="373" y="5" fill="#a78bfa">Multi-FW</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="630" width="1280" height="10" fill="url(#accent)"/>

  <!-- NETipar text branding -->
  <g transform="translate(640, 460)" text-anchor="middle" opacity="0.3">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#ffffff" letter-spacing="3">
      NETipar
    </text>
  </g>

  <!-- Version badge -->
  <g transform="translate(640, 500)" text-anchor="middle" opacity="0.2">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#ffffff" letter-spacing="1">
      Laravel 11+ / Vue 3 / React / Alpine.js / Livewire / TypeScript
    </text>
  </g>
</svg>
